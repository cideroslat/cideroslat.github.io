remote_theme: zerostaticthemes/jekyll-serif-theme
title: "CIDEROS"
description: "Innovative computer vision solutions for modern businesses."
baseurl: ""
url: "https://cideroslat.github.io"

permalink: pretty

logo:
  mobile: "assets/images/logo/logo-mobile.svg"
  mobile_height: "32px"
  mobile_width: "32px"
  desktop: "assets/images/logo/logo.svg"
  desktop_height: "32px"
  desktop_width: "140px"

home:
  limit_services: 6

# Formspree contact form endpoint — replace YOUR_FORM_ID after creating an account at formspree.io
contact_form_action: "https://formspree.io/f/YOUR_FORM_ID"

collections:
  services:
    output: true
    sort_by: weight
  services_es:
    output: true
    sort_by: weight
  team:
    output: true

defaults:
  - scope:
      path: ""
      type: "services"
    values:
      layout: "service"
  - scope:
      path: ""
      type: "services_es"
    values:
      layout: "service"
      lang: "es"
  - scope:
      path: ""
      type: "team"
    values:
      layout: "team"

sass:
  style: compressed

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - LICENSE.md
  - LICENSE
  - README.md
  - openspec/
  - promt.md
