<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 32" width="140" height="32" role="img" aria-label="CIDEROS">
  <!-- Bounding-box corners — computer vision / object detection motif -->
  <polyline points="3,11 3,3 11,3"  fill="none" stroke="#E53935" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="21,3 29,3 29,11" fill="none" stroke="#E53935" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="3,21 3,29 11,29"  fill="none" stroke="#E53935" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="21,29 29,29 29,21" fill="none" stroke="#E53935" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Eye / lens — vision symbol -->
  <path d="M8,16 Q16,7 24,16 Q16,25 8,16Z" fill="none" stroke="#E53935" stroke-width="1.5"/>
  <!-- Iris ring -->
  <circle cx="16" cy="16" r="4" fill="none" stroke="#E53935" stroke-width="1.5"/>
  <!-- Pupil -->
  <circle cx="16" cy="16" r="2" fill="#E53935"/>
  <!-- Wordmark -->
  <text x="38" y="22"
        font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
        font-size="18"
        font-weight="700"
        letter-spacing="0.08em"
        fill="#E53935">CIDEROS</text>
</svg>
