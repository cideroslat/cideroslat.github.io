<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B2D3E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0F4C5C;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0F4C5C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0B2D3E;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="400" fill="none"/>

  <!-- Monitor stand -->
  <rect x="228" y="295" width="44" height="18" rx="4" fill="#0F4C5C"/>
  <rect x="210" y="310" width="80" height="10" rx="5" fill="#0B2D3E" stroke="#1A5F73" stroke-width="1"/>

  <!-- Monitor body -->
  <rect x="120" y="80" width="260" height="220" rx="12" fill="url(#bgGrad)" stroke="#1A5F73" stroke-width="2"/>
  <rect x="132" y="92" width="236" height="196" rx="6" fill="url(#screenGrad)"/>

  <!-- Screen grid / background texture -->
  <line x1="132" y1="125" x2="368" y2="125" stroke="#1A5F73" stroke-width="0.5" opacity="0.5"/>
  <line x1="132" y1="160" x2="368" y2="160" stroke="#1A5F73" stroke-width="0.5" opacity="0.5"/>
  <line x1="132" y1="195" x2="368" y2="195" stroke="#1A5F73" stroke-width="0.5" opacity="0.5"/>
  <line x1="132" y1="230" x2="368" y2="230" stroke="#1A5F73" stroke-width="0.5" opacity="0.5"/>
  <line x1="195" y1="92" x2="195" y2="288" stroke="#1A5F73" stroke-width="0.5" opacity="0.5"/>
  <line x1="250" y1="92" x2="250" y2="288" stroke="#1A5F73" stroke-width="0.5" opacity="0.5"/>
  <line x1="305" y1="92" x2="305" y2="288" stroke="#1A5F73" stroke-width="0.5" opacity="0.5"/>

  <!-- Detected object 1 — box around a shape (car/object) -->
  <rect x="150" y="108" width="80" height="60" rx="2" fill="none" stroke="#E53935" stroke-width="2"/>
  <!-- Corner accent ticks -->
  <line x1="150" y1="115" x2="150" y2="108" stroke="#E53935" stroke-width="2.5"/>
  <line x1="150" y1="108" x2="157" y2="108" stroke="#E53935" stroke-width="2.5"/>
  <line x1="223" y1="108" x2="230" y2="108" stroke="#E53935" stroke-width="2.5"/>
  <line x1="230" y1="108" x2="230" y2="115" stroke="#E53935" stroke-width="2.5"/>
  <line x1="150" y1="161" x2="150" y2="168" stroke="#E53935" stroke-width="2.5"/>
  <line x1="150" y1="168" x2="157" y2="168" stroke="#E53935" stroke-width="2.5"/>
  <line x1="223" y1="168" x2="230" y2="168" stroke="#E53935" stroke-width="2.5"/>
  <line x1="230" y1="161" x2="230" y2="168" stroke="#E53935" stroke-width="2.5"/>
  <!-- Label tab -->
  <rect x="150" y="100" width="46" height="10" rx="2" fill="#E53935"/>
  <text x="155" y="109" font-family="Inter, sans-serif" font-size="6" fill="white" font-weight="700">OBJECT 94%</text>
  <!-- Object silhouette inside box -->
  <ellipse cx="190" cy="138" rx="22" ry="14" fill="#1A5F73" opacity="0.7"/>
  <circle cx="175" cy="140" r="5" fill="#0F4C5C"/>
  <circle cx="205" cy="140" r="5" fill="#0F4C5C"/>

  <!-- Detected object 2 — person bounding box -->
  <rect x="270" y="115" width="52" height="90" rx="2" fill="none" stroke="#00D4FF" stroke-width="2"/>
  <line x1="270" y1="122" x2="270" y2="115" stroke="#00D4FF" stroke-width="2.5"/>
  <line x1="270" y1="115" x2="277" y2="115" stroke="#00D4FF" stroke-width="2.5"/>
  <line x1="315" y1="115" x2="322" y2="115" stroke="#00D4FF" stroke-width="2.5"/>
  <line x1="322" y1="115" x2="322" y2="122" stroke="#00D4FF" stroke-width="2.5"/>
  <line x1="270" y1="198" x2="270" y2="205" stroke="#00D4FF" stroke-width="2.5"/>
  <line x1="270" y1="205" x2="277" y2="205" stroke="#00D4FF" stroke-width="2.5"/>
  <line x1="315" y1="205" x2="322" y2="205" stroke="#00D4FF" stroke-width="2.5"/>
  <line x1="322" y1="198" x2="322" y2="205" stroke="#00D4FF" stroke-width="2.5"/>
  <rect x="270" y="106" width="42" height="10" rx="2" fill="#00D4FF"/>
  <text x="274" y="115" font-family="Inter, sans-serif" font-size="6" fill="#0B2D3E" font-weight="700">PERSON 98%</text>
  <!-- Person silhouette -->
  <circle cx="296" cy="135" r="10" fill="#1A5F73"/>
  <path d="M278,190 Q278,160 296,158 Q314,160 314,190" fill="#1A5F73"/>

  <!-- Confidence scores bar on right -->
  <rect x="342" y="110" width="18" height="5" rx="2" fill="#E53935" opacity="0.4"/>
  <rect x="342" y="110" width="17" height="5" rx="2" fill="#E53935"/>
  <rect x="342" y="120" width="18" height="5" rx="2" fill="#00D4FF" opacity="0.4"/>
  <rect x="342" y="120" width="18" height="5" rx="2" fill="#00D4FF"/>
  <rect x="342" y="130" width="18" height="5" rx="2" fill="#E53935" opacity="0.4"/>
  <rect x="342" y="130" width="13" height="5" rx="2" fill="#E53935"/>
  <text x="342" y="155" font-family="Inter, sans-serif" font-size="5" fill="#5A6B77">94%</text>
  <text x="342" y="165" font-family="Inter, sans-serif" font-size="5" fill="#5A6B77">98%</text>
  <text x="342" y="175" font-family="Inter, sans-serif" font-size="5" fill="#5A6B77">72%</text>

  <!-- Neural network nodes (bottom portion of screen) -->
  <circle cx="155" cy="260" r="5" fill="#00D4FF" opacity="0.8"/>
  <circle cx="185" cy="245" r="5" fill="#00D4FF" opacity="0.8"/>
  <circle cx="185" cy="270" r="5" fill="#00D4FF" opacity="0.8"/>
  <circle cx="215" cy="252" r="5" fill="#E53935" opacity="0.9"/>
  <circle cx="245" cy="240" r="5" fill="#00D4FF" opacity="0.8"/>
  <circle cx="245" cy="265" r="5" fill="#00D4FF" opacity="0.8"/>
  <circle cx="275" cy="252" r="5" fill="#E53935" opacity="0.9"/>
  <circle cx="305" cy="252" r="7" fill="#00D4FF"/>
  <!-- Connections -->
  <line x1="155" y1="260" x2="185" y2="245" stroke="#00D4FF" stroke-width="0.8" opacity="0.5"/>
  <line x1="155" y1="260" x2="185" y2="270" stroke="#00D4FF" stroke-width="0.8" opacity="0.5"/>
  <line x1="185" y1="245" x2="215" y2="252" stroke="#00D4FF" stroke-width="0.8" opacity="0.5"/>
  <line x1="185" y1="270" x2="215" y2="252" stroke="#00D4FF" stroke-width="0.8" opacity="0.5"/>
  <line x1="215" y1="252" x2="245" y2="240" stroke="#00D4FF" stroke-width="0.8" opacity="0.5"/>
  <line x1="215" y1="252" x2="245" y2="265" stroke="#00D4FF" stroke-width="0.8" opacity="0.5"/>
  <line x1="245" y1="240" x2="275" y2="252" stroke="#00D4FF" stroke-width="0.8" opacity="0.5"/>
  <line x1="245" y1="265" x2="275" y2="252" stroke="#00D4FF" stroke-width="0.8" opacity="0.5"/>
  <line x1="275" y1="252" x2="305" y2="252" stroke="#00D4FF" stroke-width="1.2" opacity="0.8"/>

  <!-- Person figure (pointing) -->
  <!-- Head -->
  <circle cx="415" cy="170" r="22" fill="#D4A574"/>
  <!-- Hair -->
  <path d="M393,165 Q393,148 415,146 Q437,148 437,165 Q435,155 415,155 Q395,155 393,165Z" fill="#4A3728"/>
  <!-- Body -->
  <path d="M395,270 L395,230 Q395,195 415,192 Q435,195 435,230 L435,270Z" fill="#1A5F73"/>
  <!-- Arm pointing left -->
  <path d="M395,215 L340,190 Q332,187 328,183" stroke="#D4A574" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Hand / pointing finger -->
  <circle cx="325" cy="181" r="7" fill="#D4A574"/>
  <line x1="325" y1="181" x2="312" y2="172" stroke="#D4A574" stroke-width="5" stroke-linecap="round"/>
  <!-- Other arm -->
  <path d="M435,215 L460,235" stroke="#D4A574" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Legs -->
  <rect x="400" y="268" width="12" height="50" rx="6" fill="#0B2D3E"/>
  <rect x="418" y="268" width="12" height="50" rx="6" fill="#0B2D3E"/>
  <!-- Shoes -->
  <ellipse cx="406" cy="317" rx="10" ry="5" fill="#1A1A2E"/>
  <ellipse cx="424" cy="317" rx="10" ry="5" fill="#1A1A2E"/>

  <!-- Floating data points around person -->
  <rect x="450" y="140" width="36" height="20" rx="4" fill="#0F4C5C" stroke="#00D4FF" stroke-width="1"/>
  <text x="455" y="153" font-family="Inter, sans-serif" font-size="7" fill="#00D4FF">99.2% acc</text>
  <rect x="455" y="260" width="32" height="20" rx="4" fill="#0F4C5C" stroke="#E53935" stroke-width="1"/>
  <text x="460" y="273" font-family="Inter, sans-serif" font-size="7" fill="#E53935">12ms /fr</text>

  <!-- Ground shadow -->
  <ellipse cx="415" cy="325" rx="40" ry="8" fill="#0B2D3E" opacity="0.3"/>
</svg>
