<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Computer Vision Expertise — eye with neural target rings -->
  <!-- Outer detection ring -->
  <circle cx="40" cy="40" r="36" fill="none" stroke="#0B2D3E" stroke-width="2" opacity="0.3"/>
  <!-- Corner brackets (bounding-box motif) -->
  <polyline points="8,20 8,8 20,8"    fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="60,8 72,8 72,20"  fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="8,60 8,72 20,72"  fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="60,72 72,72 72,60" fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Eye / lens shape -->
  <path d="M12,40 Q40,14 68,40 Q40,66 12,40Z" fill="none" stroke="#E53935" stroke-width="2"/>
  <!-- Iris -->
  <circle cx="40" cy="40" r="12" fill="none" stroke="#E53935" stroke-width="2"/>
  <!-- Inner iris detail -->
  <circle cx="40" cy="40" r="7"  fill="none" stroke="#E53935" stroke-width="1.5" opacity="0.6"/>
  <!-- Pupil -->
  <circle cx="40" cy="40" r="4"  fill="#E53935"/>
  <!-- Highlight sparkle -->
  <circle cx="44" cy="37" r="1.5" fill="white" opacity="0.7"/>
</svg>
