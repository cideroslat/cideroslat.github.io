<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- End-to-End Solutions — connected pipeline nodes -->
  <!-- Connecting lines (behind nodes) -->
  <line x1="16" y1="40" x2="32" y2="40" stroke="#00D4FF" stroke-width="2" opacity="0.5"/>
  <line x1="48" y1="40" x2="64" y2="40" stroke="#00D4FF" stroke-width="2" opacity="0.5"/>
  <!-- Arrow heads -->
  <polyline points="28,36 33,40 28,44" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="60,36 65,40 60,44" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Vertical connector lines (top + bottom) -->
  <line x1="40" y1="16" x2="40" y2="32" stroke="#E53935" stroke-width="2" opacity="0.5"/>
  <line x1="40" y1="48" x2="40" y2="64" stroke="#E53935" stroke-width="2" opacity="0.5"/>
  <polyline points="36,61 40,66 44,61" fill="none" stroke="#E53935" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Input node (left) -->
  <circle cx="12" cy="40" r="9" fill="#0B2D3E" stroke="#00D4FF" stroke-width="2"/>
  <text x="12" y="44" font-family="monospace" font-size="9" fill="#00D4FF" text-anchor="middle">D</text>
  <!-- Processing node (center — main) -->
  <circle cx="40" cy="40" r="13" fill="#0B2D3E" stroke="#E53935" stroke-width="2.5"/>
  <circle cx="40" cy="40" r="8"  fill="none" stroke="#E53935" stroke-width="1.5" opacity="0.5"/>
  <text x="40" y="44" font-family="monospace" font-size="9" fill="#E53935" text-anchor="middle">AI</text>
  <!-- Output node (right) -->
  <circle cx="68" cy="40" r="9" fill="#0B2D3E" stroke="#00D4FF" stroke-width="2"/>
  <text x="68" y="44" font-family="monospace" font-size="7" fill="#00D4FF" text-anchor="middle">OUT</text>
  <!-- Top node (data ingestion) -->
  <circle cx="40" cy="12" r="9" fill="#0B2D3E" stroke="#00D4FF" stroke-width="2"/>
  <line x1="36" y1="12" x2="44" y2="12" stroke="#00D4FF" stroke-width="1.5"/>
  <line x1="40" y1="8"  x2="40" y2="16" stroke="#00D4FF" stroke-width="1.5"/>
  <!-- Bottom node (deployment) -->
  <circle cx="40" cy="68" r="9" fill="#0B2D3E" stroke="#00D4FF" stroke-width="2"/>
  <polyline points="36,66 40,71 44,66" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
